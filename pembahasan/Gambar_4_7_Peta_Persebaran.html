    // Draw Routes first so they are under the markers
    L.geoJSON(routes, {
        style: function(feature) {
            return {
                color: feature.properties.color,
                weight: 4,
                opacity: 0.7
            };
        },
        onEachFeature: function (feature, layer) {

        }
    }).addTo(map);

        className: 'custom-div-icon',
        html: "<div style='background-color:#3498db; width:10px; height:10px; border-radius:50%; border:1px solid white; box-shadow: 0 0 2px rgba(0,0,0,0.5);'></div>",
        iconSize: [10, 10],
        iconAnchor: [5, 5]
    });

    var poiIcon = L.divIcon({
        className: 'custom-div-icon',
        html: "<div style='background-color:#e74c3c; width:16px; height:16px; border-radius:50%; border:2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.5);'></div>",
        iconSize: [16, 16],
        iconAnchor: [8, 8]
    });

    var activePoisCount = 0;

    stops.forEach(function(s) {
        if (s.lat && s.lon) {
            L.marker([s.lat, s.lon], {icon: stopIcon}).addTo(map)
             .bindPopup("<b>Halte:</b> " + (s.stop_name || s.stop_id));
        }
    });

    pois.forEach(function(p) {
        if (p.lat && p.lon && p.needs_review !== 1) {
            activePoisCount++;
            L.marker([p.lat, p.lon], {icon: poiIcon}).addTo(map)
             .bindPopup("<b>Wisata:</b> " + p.name + "<br><b>Kategori:</b> " + p.type);
        }
    });

    // Legend
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        var div = L.DomUtil.create('div', 'info legend');
        div.innerHTML += '<b>Keterangan Simbol</b><br>';
        div.innerHTML += '<i style="background: #3498db; border:1px solid white"></i> Halte Trans Jogja (' + stops.length + ' titik)<br>';

    };
    legend.addTo(map);
